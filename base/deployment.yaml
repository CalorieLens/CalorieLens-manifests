apiVersion: apps/v1
kind: Deployment
metadata:
  name: calorielens-api
  labels:
    app: calorielens-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calorielens-api
  template:
    metadata:
      labels:
        app: calorielens-api
    spec:
      containers:
        - name: calorielens-api
          image: xronace/calorielens-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: calorielens-config
            - secretRef:
                name: calorielens-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
