# MinIO (standalone) for meal-image storage — PROD namespace `calorielens-prod`.
# Applied MANUALLY via kubectl (not ArgoCD-managed, like the sealed secrets).
# Root creds come from the `minio-creds` Secret (created out-of-band, not committed);
# the SAME access/secret are sealed into `calorielens-secrets` as S3_ACCESS_KEY/S3_SECRET_KEY.
# Image is PINNED to the release dev was verified on (dev uses :latest).
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: calorielens-prod
  labels: { app: minio }
spec:
  selector: { app: minio }
  ports:
    - { name: api, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: calorielens-prod
  labels: { app: minio }
spec:
  serviceName: minio
  replicas: 1
  selector: { matchLabels: { app: minio } }
  template:
    metadata:
      labels: { app: minio }
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-09-07T16-13-09Z   # pinned (matches verified dev)
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom: { secretKeyRef: { name: minio-creds, key: MINIO_ROOT_USER } }
            - name: MINIO_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: minio-creds, key: MINIO_ROOT_PASSWORD } }
          ports:
            - { containerPort: 9000, name: api }
            - { containerPort: 9001, name: console }
          volumeMounts:
            - { name: data, mountPath: /data }
          resources:
            requests: { memory: 256Mi, cpu: 100m }
            limits: { memory: 512Mi, cpu: 500m }
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: 9000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /minio/health/live, port: 9000 }
            initialDelaySeconds: 15
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources: { requests: { storage: 20Gi } }
