apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- ingress.yaml

namespace: calorielens-prod

# CI replaces this tag with the git SHA on every push to main.
# To roll back: set newTag to a previous SHA and push.
images:
- name: ghcr.io/calorielens/calorielens-api
  newTag: 910c439

# Version gate (prod only): nudge < 1.3.0 clients to update after the 1.3.0
# App Store release; min-supported stays 1.0.0 (no forced update). Served by
# GET /api/v1/app-config. NOTE: env vars are read at startup — a rollout
# restart (or the next deploy) is required for running pods to pick this up.
patches:
- path: patch-deployment.yaml
- patch: |-
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: calorielens-config
    data:
      LATEST_APP_VERSION: "1.3.0"
      MIN_SUPPORTED_VERSION: "1.0.0"
  target:
    kind: ConfigMap
    name: calorielens-config
