apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: calorielens-api
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  ingressClassName: nginx
  rules:
    - host: api-prod.121.138.171.230.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: calorielens-api
                port:
                  number: 80
    # Stable DDNS hostname (ASUS DDNS auto-tracks the dynamic public IP). The
    # iOS Prod build targets this instead of the static-IP sslip.io host, so the
    # app keeps working when the ISP changes the IP. The sslip.io host above is
    # retained for backward compatibility with already-installed builds.
    - host: xronocore.asuscomm.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: calorielens-api
                port:
                  number: 80
  tls:
    - hosts:
        - api-prod.121.138.171.230.sslip.io
      secretName: calorielens-api-prod-tls
    - hosts:
        - xronocore.asuscomm.com
      secretName: calorielens-api-prod-asuscomm-tls
