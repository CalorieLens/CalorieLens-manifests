apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- ingress.yaml
# Push nudge CronJobs — DEV only for now (prod stays 1.4.0 until 1.5.0 release; its image
# has no app.jobs module). Add `- ../../cronjobs` to overlays/prod-env at prod release.
# Referenced as a directory — kustomize blocks raw cross-dir file paths.
- ../../cronjobs

namespace: calorielens

# CI replaces this tag with the git SHA on every push to main.
# To roll back: set newTag to a previous SHA and push.
images:
- name: ghcr.io/calorielens/calorielens-api
  newTag: 6f40f7f

patches:
- path: patch-deployment.yaml
